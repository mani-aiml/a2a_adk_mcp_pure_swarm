services:

  mcp-server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    ports:
      - "8003:8003"
    environment:
      AGENT_HOST: "0.0.0.0"
      NOVA_API_KEY: ${NOVA_API_KEY}
    networks:
      - appraisal-net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8003), timeout=5).close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  style-agent:
    build:
      context: .
      dockerfile: style_agent/Dockerfile
    ports:
      - "8000:8000"
    environment:
      MCP_SERVER_URL: "http://mcp-server:8003/mcp"
      NOVA_API_KEY: ${NOVA_API_KEY}
    depends_on:
      mcp-server:
        condition: service_healthy
    networks:
      - appraisal-net

  provenance-agent:
    build:
      context: .
      dockerfile: provenance_agent/Dockerfile
    ports:
      - "8001:8001"
    environment:
      MCP_SERVER_URL: "http://mcp-server:8003/mcp"
      NOVA_API_KEY: ${NOVA_API_KEY}
    depends_on:
      mcp-server:
        condition: service_healthy
    networks:
      - appraisal-net

  valuation-agent:
    build:
      context: .
      dockerfile: valuation_agent/Dockerfile
    ports:
      - "8002:8002"
    environment:
      MCP_SERVER_URL: "http://mcp-server:8003/mcp"
      NOVA_API_KEY: ${NOVA_API_KEY}
    depends_on:
      mcp-server:
        condition: service_healthy
    networks:
      - appraisal-net

  synthesis-agent:
    build:
      context: .
      dockerfile: synthesis_agent/Dockerfile
    ports:
      - "8004:8004"
    environment:
      NOVA_API_KEY: ${NOVA_API_KEY}
    networks:
      - appraisal-net

networks:
  appraisal-net:
    driver: bridge
